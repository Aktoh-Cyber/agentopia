name: Deploy Agents

on:
  pull_request:
    paths: ['agents/**']
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy all agents (excludes test agents)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'

jobs:
  detect-changes:
    name: Detect Changed Agents
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.detect.outputs.agents }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed agents
        id: detect
        run: |
          set -e
          
          # Find all agent directories with metadata files
          find agents -name ".agent-metadata.json" -type f > all_agents.txt
          
          if [ "${{ github.event.inputs.force_deploy }}" = "true" ]; then
            # Force deploy mode - deploy all agents except test agents
            # Use wrangler.toml presence as the marker for a deployable agent
            agents=$(find agents -mindepth 2 -maxdepth 2 -name "wrangler.toml" -type f | while read toml; do
              agent_dir=$(dirname "$toml")
              agent_name=$(basename "$agent_dir")
              # Exclude test agents
              if [[ ! "$agent_name" =~ test ]]; then
                echo "\"$agent_dir\""
              fi
            done | jq -cs '.')
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            # Detect changes from PR
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base_sha="${{ github.event.pull_request.base.sha }}"
            else
              base_sha="HEAD~1"
            fi

            # Get changed files in agents/
            git diff --name-only "$base_sha" HEAD -- agents/ > changed_files.txt

            # Extract unique agent directories from changed files
            # Use wrangler.toml presence as the marker for a deployable agent
            agents=$(cat changed_files.txt | while read file; do
              if [[ "$file" =~ ^agents/([^/]+)/ ]]; then
                agent_name="${BASH_REMATCH[1]}"
                agent_dir="agents/$agent_name"
                # Only include if it's a valid agent directory with wrangler.toml
                # and exclude test agents (containing "test" in the name)
                if [ -f "$agent_dir/wrangler.toml" ] && [[ ! "$agent_name" =~ test ]]; then
                  echo "\"$agent_dir\""
                fi
              fi
            done | sort -u | jq -cs '.')
            
            if [ "$(echo "$agents" | jq 'length')" -gt 0 ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi
          
          echo "agents=$agents" >> $GITHUB_OUTPUT
          echo "Detected agents for deployment: $agents"

  validate-agents:
    name: Validate Agent Configuration
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      matrix:
        agent: ${{ fromJson(needs.detect-changes.outputs.agents) }}
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Validate agent structure
        run: |
          agent_dir="${{ matrix.agent }}"
          
          echo "Validating $agent_dir"
          
          # Check required files exist (agents may be Python or JavaScript)
          if [ -f "$agent_dir/src/entry.py" ]; then
            # Python agent
            required_files=("src/entry.py" "wrangler.toml")
            echo "Detected Python agent"
          elif [ -f "$agent_dir/src/index.js" ]; then
            # JavaScript agent
            required_files=("src/index.js" "wrangler.toml")
            echo "Detected JavaScript agent"
          else
            echo "❌ No valid entry point found (src/entry.py or src/index.js)"
            exit 1
          fi
          
          for file in "${required_files[@]}"; do
            if [ ! -f "$agent_dir/$file" ]; then
              echo "❌ Missing required file: $agent_dir/$file"
              exit 1
            fi
          done
          
          echo "✅ Agent structure validation passed"

      - name: Validate syntax
        run: |
          agent_dir="${{ matrix.agent }}"
          
          if [ -f "$agent_dir/src/entry.py" ]; then
            echo "Checking Python syntax for $agent_dir/src/entry.py"
            uv run python -m py_compile "$agent_dir/src/entry.py"
            echo "✅ Python syntax validation passed"
          elif [ -f "$agent_dir/src/index.js" ]; then
            echo "Checking JavaScript syntax for $agent_dir/src/index.js"
            node -c "$agent_dir/src/index.js"
            echo "✅ JavaScript syntax validation passed"
          fi

      - name: Validate Wrangler configuration
        run: |
          agent_dir="${{ matrix.agent }}"
          cd "$agent_dir"
          
          echo "Validating wrangler.toml configuration"
          # Check if wrangler can parse the config
          npx wrangler whoami >/dev/null 2>&1 || echo "Warning: Wrangler auth not available in CI"
          
          # Basic toml syntax check
          if ! uv run python -c "import tomllib; open('wrangler.toml', 'rb')" 2>/dev/null; then
            echo "Installing toml parser..."
            uv add toml
            uv run python -c "import toml; toml.load('wrangler.toml')"
          fi
          
          echo "✅ Wrangler configuration validation passed"

  deploy-agents:
    name: Deploy Agent to Cloudflare
    runs-on: ubuntu-latest
    needs: [detect-changes, validate-agents]
    if: needs.detect-changes.outputs.has_changes == 'true' && ((github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch')
    strategy:
      matrix:
        agent: ${{ fromJson(needs.detect-changes.outputs.agents) }}
      fail-fast: false
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Copy agent framework
        run: |
          agent_dir="${{ matrix.agent }}"

          # Copy Python agent framework if this is a Python agent.
          # Pyodide resolves imports relative to the directory containing `main`
          # (typically src/), so the framework MUST live at src/agent_framework
          # — not at the agent root. Placing it at the agent root yields
          # ModuleNotFoundError: No module named 'agent_framework' at deploy time.
          if [ -f "$agent_dir/src/entry.py" ]; then
            # Wipe any stale copies to avoid duplicated/divergent trees.
            rm -rf "$agent_dir/agent_framework" "$agent_dir/src/agent_framework"
            cp -r generators/python/agent_framework "$agent_dir/src/"
            echo "✅ Copied Python agent framework into $agent_dir/src/"
          fi

      - name: Install JS agent dependencies
        run: |
          agent_dir="${{ matrix.agent }}"
          # JS agents bundle @langchain/core, etc. via esbuild at deploy time.
          # wrangler deploy runs esbuild which requires node_modules to resolve
          # bare imports — install deps here for any agent with package.json.
          if [ -f "$agent_dir/package.json" ]; then
            echo "Installing dependencies for $agent_dir"
            (cd "$agent_dir" && (npm ci --no-audit --no-fund 2>/dev/null || npm install --no-audit --no-fund))
            echo "✅ Installed JS dependencies for $agent_dir"
          else
            echo "No package.json in $agent_dir — skipping npm install"
          fi

      - name: Sanitize and validate Cloudflare credentials
        env:
          RAW_CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Cloudflare error 6111 ("Invalid format for Authorization header") almost
          # always means the token has stray whitespace, a trailing newline, or that
          # a conflicting CLOUDFLARE_EMAIL/CLOUDFLARE_API_KEY pair is also present.
          # GitHub's secret-injection has been observed to preserve trailing \n when
          # the secret was pasted from a terminal — strip whitespace defensively.

          clean=$(printf '%s' "$RAW_CF_API_TOKEN" | tr -d '[:space:]')

          if [ -z "$clean" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is empty after stripping whitespace."
            exit 1
          fi

          # Report length and first/last 4 chars (safe to log) so we can confirm
          # the secret made it through without leaking the body.
          #
          # NOTE: GitHub Actions masks digits that appear inside high-entropy
          # secrets. Plain integers like "53" can be redacted to "***" if those
          # digits collide with secret content. Encode the length so the output
          # cannot collide: emit `len * 7 + 3`. Decode by hand: (x-3)/7.
          #   53 chars -> 374
          #    1 char  -> 10
          #    0 chars -> 3 (but we already exit above)
          len=${#clean}
          encoded=$(( len * 7 + 3 ))
          head4=$(printf '%s' "$clean" | cut -c1-4)
          tail4=$(printf '%s' "$clean" | rev | cut -c1-4 | rev)
          echo "Token length encoded (len*7+3): $encoded  head=${head4}...  tail=...${tail4}"

          # Also emit a hash so we can compare across runs without leaking the
          # body. sha256sum of a 53-char token is deterministic; if two runs
          # produce different hashes, the secret content changed between sets.
          token_hash=$(printf '%s' "$clean" | sha256sum | cut -c1-12)
          echo "Token sha256 prefix: $token_hash"

          # Cloudflare API tokens are 40 chars, alphanumeric + underscore/dash.
          # Global API Key + email auth uses CLOUDFLARE_API_KEY (legacy) and would
          # ALSO break wrangler if mixed with CLOUDFLARE_API_TOKEN. Fail fast if
          # any conflicting auth env vars are set.
          if [ -n "${CLOUDFLARE_EMAIL:-}" ] || [ -n "${CLOUDFLARE_API_KEY:-}" ]; then
            echo "::error::Conflicting auth env vars detected. Wrangler should use CLOUDFLARE_API_TOKEN only — unset CLOUDFLARE_EMAIL / CLOUDFLARE_API_KEY."
            exit 1
          fi

          # Persist the cleaned token for downstream steps.
          echo "CLOUDFLARE_API_TOKEN=$clean" >> "$GITHUB_ENV"

      - name: Verify wrangler auth (whoami)
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@latest whoami

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
        run: |
          agent_dir="${{ matrix.agent }}"
          cd "$agent_dir"

          echo "Deploying agent from $agent_dir"

          # Prefer per-agent deploy script if present; otherwise use wrangler deploy
          # (wrangler.toml is required and is the source of truth for routes/bindings).
          if [ -x scripts/deploy.sh ] || [ -f scripts/deploy.sh ]; then
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
          else
            npx wrangler@latest deploy
          fi

          echo "✅ Successfully deployed agent"

      - name: Update deployment status
        if: always()
        run: |
          agent_dir="${{ matrix.agent }}"
          agent_name=$(basename "$agent_dir")
          
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Agent $agent_name deployed successfully"
          else
            echo "❌ Agent $agent_name deployment failed"
          fi

  notify-completion:
    name: Notify Deployment Completion
    runs-on: ubuntu-latest
    needs: [detect-changes, validate-agents, deploy-agents]
    if: always() && needs.detect-changes.outputs.has_changes == 'true'
    steps:
      - name: Summary
        run: |
          echo "## Agent Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy-agents.result }}" = "success" ]; then
            echo "✅ All agents deployed successfully" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deploy-agents.result }}" = "failure" ]; then
            echo "❌ Some agent deployments failed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.validate-agents.result }}" = "failure" ]; then
            echo "❌ Agent validation failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Validation completed, deployment pending merge" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Agents processed: ${{ needs.detect-changes.outputs.agents }}" >> $GITHUB_STEP_SUMMARY