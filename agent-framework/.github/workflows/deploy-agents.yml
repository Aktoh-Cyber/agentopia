name: Deploy Generated Agents

on:
  pull_request:
    paths: ['generated-agents/**']
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy all agents'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  detect-changes:
    name: Detect Changed Agents
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.detect.outputs.agents }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed agents
        id: detect
        run: |
          set -e
          
          # Find all agent directories with metadata files
          find generated-agents -name ".agent-metadata.json" -type f > all_agents.txt
          
          if [ "${{ github.event.inputs.force_deploy }}" = "true" ]; then
            # Force deploy mode - deploy all agents
            agents=$(cat all_agents.txt | while read metadata_file; do
              agent_dir=$(dirname "$metadata_file")
              echo "\"$agent_dir\""
            done | jq -s '.')
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            # Detect changes from PR
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base_sha="${{ github.event.pull_request.base.sha }}"
            else
              base_sha="HEAD~1"
            fi
            
            # Get changed files in generated-agents/
            git diff --name-only "$base_sha" HEAD -- generated-agents/ > changed_files.txt
            
            # Extract unique agent directories from changed files
            agents=$(cat changed_files.txt | while read file; do
              if [[ "$file" =~ ^generated-agents/(router-agents|specialist-agents)/([^/]+)/ ]]; then
                agent_dir="generated-agents/${BASH_REMATCH[1]}/${BASH_REMATCH[2]}"
                # Only include if metadata file exists
                if [ -f "$agent_dir/.agent-metadata.json" ]; then
                  echo "\"$agent_dir\""
                fi
              fi
            done | sort -u | jq -s '.')
            
            if [ "$(echo "$agents" | jq 'length')" -gt 0 ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi
          
          echo "agents=$agents" >> $GITHUB_OUTPUT
          echo "Detected agents for deployment: $agents"

  validate-agents:
    name: Validate Agent Configuration
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      matrix:
        agent: ${{ fromJson(needs.detect-changes.outputs.agents) }}
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Validate agent metadata
        run: |
          agent_dir="${{ matrix.agent }}"
          metadata_file="$agent_dir/.agent-metadata.json"
          
          echo "Validating $agent_dir"
          
          # Check required files exist
          required_files=("src/entry.py" "wrangler.toml" ".agent-metadata.json")
          for file in "${required_files[@]}"; do
            if [ ! -f "$agent_dir/$file" ]; then
              echo "❌ Missing required file: $agent_dir/$file"
              exit 1
            fi
          done
          
          # Validate JSON metadata
          if ! jq empty "$metadata_file" 2>/dev/null; then
            echo "❌ Invalid JSON in metadata file: $metadata_file"
            exit 1
          fi
          
          # Check required metadata fields
          required_fields=("generatedAt" "workerName" "domain" "type" "language" "accountId" "zoneId")
          for field in "${required_fields[@]}"; do
            if ! jq -e ".$field" "$metadata_file" >/dev/null; then
              echo "❌ Missing required metadata field: $field"
              exit 1
            fi
          done
          
          echo "✅ Agent validation passed"

      - name: Validate Python syntax
        run: |
          agent_dir="${{ matrix.agent }}"
          echo "Checking Python syntax for $agent_dir/src/entry.py"
          python -m py_compile "$agent_dir/src/entry.py"
          echo "✅ Python syntax validation passed"

      - name: Validate Wrangler configuration
        run: |
          agent_dir="${{ matrix.agent }}"
          cd "$agent_dir"
          
          echo "Validating wrangler.toml configuration"
          # Check if wrangler can parse the config
          npx wrangler whoami >/dev/null 2>&1 || echo "Warning: Wrangler auth not available in CI"
          
          # Basic toml syntax check
          if ! python -c "import toml; toml.load('wrangler.toml')" 2>/dev/null; then
            pip install toml
            python -c "import toml; toml.load('wrangler.toml')"
          fi
          
          echo "✅ Wrangler configuration validation passed"

  deploy-agents:
    name: Deploy Agent to Cloudflare
    runs-on: ubuntu-latest
    needs: [detect-changes, validate-agents]
    if: needs.detect-changes.outputs.has_changes == 'true' && github.event_name == 'pull_request' && github.event.pull_request.merged == true
    strategy:
      matrix:
        agent: ${{ fromJson(needs.detect-changes.outputs.agents) }}
      fail-fast: false
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Copy agent framework
        run: |
          agent_dir="${{ matrix.agent }}"
          
          # Copy Python agent framework if this is a Python agent
          if [ -f "$agent_dir/src/entry.py" ]; then
            cp -r generators/python/agent_framework "$agent_dir/"
            echo "✅ Copied Python agent framework"
          fi

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          agent_dir="${{ matrix.agent }}"
          cd "$agent_dir"
          
          echo "Deploying agent from $agent_dir"
          
          # Extract worker name from metadata
          worker_name=$(jq -r '.workerName' .agent-metadata.json)
          echo "Worker name: $worker_name"
          
          # Deploy using wrangler
          npx wrangler deploy
          
          echo "✅ Successfully deployed $worker_name"

      - name: Update deployment status
        if: always()
        run: |
          agent_dir="${{ matrix.agent }}"
          worker_name=$(jq -r '.workerName' "$agent_dir/.agent-metadata.json")
          domain=$(jq -r '.domain' "$agent_dir/.agent-metadata.json")
          
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ $worker_name deployed successfully to https://$domain"
          else
            echo "❌ $worker_name deployment failed"
          fi

  notify-completion:
    name: Notify Deployment Completion
    runs-on: ubuntu-latest
    needs: [detect-changes, validate-agents, deploy-agents]
    if: always() && needs.detect-changes.outputs.has_changes == 'true'
    steps:
      - name: Summary
        run: |
          echo "## Agent Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy-agents.result }}" = "success" ]; then
            echo "✅ All agents deployed successfully" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deploy-agents.result }}" = "failure" ]; then
            echo "❌ Some agent deployments failed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.validate-agents.result }}" = "failure" ]; then
            echo "❌ Agent validation failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Validation completed, deployment pending merge" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Agents processed: ${{ needs.detect-changes.outputs.agents }}" >> $GITHUB_STEP_SUMMARY