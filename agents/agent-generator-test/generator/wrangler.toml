name = "generator"
main = "src/entry.py"
compatibility_date = "2024-01-01"
compatibility_flags = ["python_workers"]
account_id = "your-account-id"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "CACHE"
id = "94f2859d6efd4fc8830887d5d797324a"

[vars]
MAX_TOKENS = "1024"
TEMPERATURE = "0.2"
GITHUB_REPO_OWNER = "your-github-username"
GITHUB_REPO_NAME = "agent-framework"

# Add these as secrets using: wrangler secret put GITHUB_TOKEN
# GITHUB_TOKEN = "your-github-personal-access-token"

[[routes]]
pattern = "generator.mindhive.tech/*"
zone_id = "your-zone-id"
