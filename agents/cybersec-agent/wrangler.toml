name = "cybersec-py"
main = "src/entry.py"
compatibility_date = "2024-01-01"
compatibility_flags = ["python_workers"]
# account_id is read from CLOUDFLARE_ACCOUNT_ID env var

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "CACHE"
id = "f367455d90284df4b6849d0311891999"

[vars]
MAX_TOKENS = "512"
TEMPERATURE = "0.3"
# Evolve integration
EVOLVE_BRIDGE_URL = "https://edge-bridge.aktohcyber.com"
EVOLVE_LLM_ROUTER_URL = "https://llm-router.aktohcyber.com"
EVOLVE_TRACE_ENABLED = "true"

# Evolve service token - add via: npx wrangler secret put EVOLVE_SERVICE_TOKEN

[[routes]]
pattern = "cybersec.aktohcyber.com/*"
zone_id = "b98246c737e343700e7132483aff63a9"
