name = "infosec"
main = "src/index.js"
compatibility_date = "2024-01-01"
account_id = "78c174f520fcee55c68bcf73245ec4da"

[ai]
binding = "AI"

[vars]
MAX_TOKENS = "1024"
TEMPERATURE = "0.4"
# Evolve integration
EVOLVE_BRIDGE_URL = "https://edge-bridge.aktohcyber.com"
EVOLVE_LLM_ROUTER_URL = "https://llm-router.aktohcyber.com"
EVOLVE_TRACE_ENABLED = "true"

# Evolve service token - add via: npx wrangler secret put EVOLVE_SERVICE_TOKEN

[[routes]]
pattern = "infosec.aktohcyber.com/*"
zone_id = "b98246c737e343700e7132483aff63a9"
