name = "judge-py"
main = "src/entry.py"
compatibility_date = "2024-01-01"
compatibility_flags = ["python_workers"]
account_id = "82d842d586a0298981ab28617ec8ac66"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "CACHE"
id = "94f2859d6efd4fc8830887d5d797324a"

[vars]
MAX_TOKENS = "512"
TEMPERATURE = "0.3"
# Evolve integration
EVOLVE_BRIDGE_URL = "https://edge-bridge.aktohcyber.com"
EVOLVE_LLM_ROUTER_URL = "https://llm-router.aktohcyber.com"
EVOLVE_TRACE_ENABLED = "true"

# Evolve service token - add via: npx wrangler secret put EVOLVE_SERVICE_TOKEN

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1002"

  [ratelimits.simple]
  limit = 100
  period = 60

[[routes]]
pattern = "judge-py.mindhive.tech/*"
zone_id = "4f8b8a0bd742d7872f75b8144b3851f8"
