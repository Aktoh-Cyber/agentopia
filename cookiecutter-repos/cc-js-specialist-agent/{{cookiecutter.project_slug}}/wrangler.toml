name = "{{cookiecutter.project_slug}}"
compatibility_date = "2024-01-01"
main = "src/index.js"

[vars]
AI_MODEL = "{{cookiecutter.ai_model}}"
MAX_TOKENS = {{cookiecutter.max_tokens}}
TEMPERATURE = {{cookiecutter.temperature}}

# Uncomment to enable KV caching
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# If using custom domain routing
# [routes]
# pattern = "{{cookiecutter.domain}}/*"
# zone_id = "{{cookiecutter.cloudflare_zone_id}}"

# Account ID for deployment
# account_id = "{{cookiecutter.cloudflare_account_id}}"