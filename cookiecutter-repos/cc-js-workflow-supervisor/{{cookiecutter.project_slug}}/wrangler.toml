name = "{{ cookiecutter.project_slug }}"
main = "src/index.js"
compatibility_date = "2024-01-01"
node_compat = true

# Account and zone configuration
{% if cookiecutter.cloudflare_account_id %}
account_id = "{{ cookiecutter.cloudflare_account_id }}"
{% endif %}
{% if cookiecutter.cloudflare_zone_id %}
zone_id = "{{ cookiecutter.cloudflare_zone_id }}"
{% endif %}

# AI binding for Cloudflare Workers AI
[ai]
binding = "AI"

# Optional KV namespace for workflow state persistence
# [[kv_namespaces]]
# binding = "WORKFLOW_STATE"
# id = "your-kv-namespace-id"

# Environment variables
[vars]
WORKFLOW_STRATEGY = "{{ cookiecutter.supervisor_strategy }}"
ERROR_HANDLING = "{{ cookiecutter.error_handling }}"
MAX_RETRIES = {{ cookiecutter.max_retries }}
TIMEOUT_MS = {{ cookiecutter.timeout_ms }}

# Custom domain routing (if configured)
{% if cookiecutter.domain %}
[[routes]]
pattern = "{{ cookiecutter.domain }}"
zone_name = "{{ cookiecutter.domain.split('.')[1:] | join('.') }}"
{% endif %}

# Development configuration
[env.development]
vars = { ENVIRONMENT = "development" }

# Production configuration
[env.production]
vars = { ENVIRONMENT = "production" }