name = "{{ cookiecutter.project_slug }}"
main = "src/entry.py"
compatibility_date = "2024-01-15"
compatibility_flags = ["python_workers"]

[env.production]
name = "{{ cookiecutter.project_slug }}"
route = { pattern = "{{ cookiecutter.domain }}/*", zone_id = "{{ cookiecutter.cloudflare_zone_id }}" }

[env.staging]
name = "{{ cookiecutter.project_slug }}-staging"
route = { pattern = "staging-{{ cookiecutter.domain }}/*", zone_id = "{{ cookiecutter.cloudflare_zone_id }}" }

# Python Worker configuration
[python]
# Requirements file for Python dependencies (optional, for development)
requirements = """
# Standard library only for Pyodide runtime compatibility
# Third-party packages supported via Pywrangler bundling
"""

# AI binding for Cloudflare Workers AI
[[ai]]
binding = "AI"

# KV binding for workflow state persistence
[[kv_namespaces]]
binding = "KV"
id = "your-kv-namespace-id-here"
preview_id = "your-preview-kv-namespace-id-here"

# Environment variables
[vars]
ENVIRONMENT = "development"
AI_MODEL = "{{ cookiecutter.ai_model }}"
MAX_TOKENS = {{ cookiecutter.max_tokens }}
TEMPERATURE = {{ cookiecutter.temperature }}
CACHE_TTL = {{ cookiecutter.cache_ttl }}
SUPERVISOR_STRATEGY = "{{ cookiecutter.supervisor_strategy }}"
ERROR_HANDLING = "{{ cookiecutter.error_handling }}"
MAX_RETRIES = {{ cookiecutter.max_retries }}
TIMEOUT_MS = {{ cookiecutter.timeout_ms }}

# Workflow configuration (JSON strings)
WORKFLOW_STEPS = '{{ cookiecutter.workflow_steps_json }}'
SPECIALIST_AGENTS = '{{ cookiecutter.specialist_agents_json }}'

# Development configuration
[env.development]
name = "{{ cookiecutter.project_slug }}-dev"

[env.development.vars]
ENVIRONMENT = "development"
DEBUG = "true"

# Production configuration
[env.production.vars]
ENVIRONMENT = "production"
DEBUG = "false"

# Staging configuration  
[env.staging.vars]
ENVIRONMENT = "staging"
DEBUG = "false"