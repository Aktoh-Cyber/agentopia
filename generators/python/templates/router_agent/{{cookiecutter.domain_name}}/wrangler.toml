name = "{{cookiecutter.domain_name}}"
main = "src/entry.py"
compatibility_date = "2024-01-01"
compatibility_flags = ["python_workers"]
account_id = "{{cookiecutter.accountId}}"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "CACHE"
id = "94f2859d6efd4fc8830887d5d797324a"

[vars]
MAX_TOKENS = "{{cookiecutter.maxTokens}}"
TEMPERATURE = "{{cookiecutter.temperature}}"

[[routes]]
pattern = "{{cookiecutter.domain}}/*"
zone_id = "{{cookiecutter.zoneId}}"